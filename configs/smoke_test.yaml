models:
  chat: qwen3:4b-instruct
  embed: bge-m3:latest

sparql_endpoint_url: http://localhost:7200/repositories/spb_company_mini_slice
schema_summary_path: configs/schema_company_mini_summary.txt
use_common_allowed: false
allowed_predicates:
  - rdf:type
  - rdfs:label
  - spb:prefLabel
  - dbo:location
  - dbo:industry
  - dbo:keyPerson
  - dbo:foundingYear
  - dbo:numberOfEmployees
  - foaf:name
allowed_types:
  - dbo:Company
  - gn:Feature
  - foaf:Person
slot_type_hints:
  company: dbo:Company
  location: gn:Feature
  person: foaf:Person

sizes:
  phase1_templates_per_category: 1
  phase1_seeds_per_template: 1
  phase2_seeds_per_category: 1
  target_per_category: 1

template_candidates: 2
reverse_query_timeout_sec: 20
max_attempts_factor: 3
max_row_checks: 20
predicate_whitelist_topk: 200
schema_summary_topk: 30
schema_timeout_sec: 20
sparql_infer: false
sparql_timeout_sec: 20
generated_query_limit: 5
retrieval_top_k: 2
repair_attempts: 1
dup_sim_threshold: 0.99
